name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  be-unit-tests:
    name: "BE: Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests
        working-directory: backend
        run: ./gradlew unitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be-unit-test-results
          path: backend/build/reports/tests/
          retention-days: 7

  be-integration-tests:
    name: "BE: Integration Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
        run: ./gradlew integrationTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be-integration-test-results
          path: backend/build/reports/tests/
          retention-days: 7

  fe-security-tests:
    name: "FE: Playwright Security Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright-security
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright-security.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.cache-playwright-security.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Build backend
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Wait for Kafka readiness
        run: |
          echo "Waiting for Kafka to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 9092 2>/dev/null; then
              echo "Kafka port is open, waiting for broker to stabilize..."
              sleep 5
              echo "Kafka is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
          ANTHROPIC_API_KEY: test-key
          SPRING_PROFILES_ACTIVE: mock-claude
        run: |
          java -Dspring.profiles.active=mock-claude -jar build/libs/*.jar &
          sleep 15

      - name: Verify backend is running
        run: |
          echo "Checking backend health..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/api/words?page=0\&size=1 > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 3
          done
          curl -sf http://localhost:3001/api/words?page=0\&size=1 || (echo "ERROR: Backend not responding" && exit 1)

      - name: Build and serve frontend
        working-directory: frontend
        run: |
          npm run build
          npx serve -s dist -l 3000 &
          sleep 3

      - name: Verify frontend is serving
        run: |
          curl -sf http://localhost:3000 > /dev/null || (echo "ERROR: Frontend not responding" && exit 1)
          echo "Frontend is serving"

      - name: Run Playwright security tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3001
        run: npx playwright test --project=security

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fe-playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  be-performance-tests:
    name: "BE: Performance / Load Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/apache-jmeter-5.6.3
          key: ${{ runner.os }}-jmeter-5.6.3

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          JMETER_VERSION=5.6.3
          wget -q "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz" -O /tmp/jmeter.tgz
          tar xzf /tmp/jmeter.tgz -C /opt

      - name: Add JMeter to PATH
        run: echo "/opt/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Build backend
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Wait for Kafka readiness
        run: |
          echo "Waiting for Kafka to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 9092 2>/dev/null; then
              echo "Kafka port is open, waiting for broker to stabilize..."
              sleep 5
              echo "Kafka is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
          ANTHROPIC_API_KEY: test-key
          SPRING_PROFILES_ACTIVE: mock-claude
        run: |
          java -Dspring.profiles.active=mock-claude -jar build/libs/*.jar &
          sleep 15

      - name: Verify backend is running
        run: |
          echo "Checking backend health..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 3
          done
          curl -sf http://localhost:3001/api/health || (echo "ERROR: Backend not responding" && exit 1)

      - name: Run JMeter load test
        working-directory: backend/src/test/jmeter
        run: |
          jmeter -n \
            -t load-test.jmx \
            -l results.csv \
            -e -o report/ \
            -Jhost=localhost \
            -Jport=3001 \
            -Jthreads=100 \
            -Jrampup=30 \
            -Jduration=120

      - name: Check performance thresholds
        working-directory: backend/src/test/jmeter
        run: bash check-results.sh results.csv 5.0 5000

      - name: Upload JMeter report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be-jmeter-report
          path: backend/src/test/jmeter/report/
          retention-days: 7

      - name: Upload JMeter results CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be-jmeter-results
          path: backend/src/test/jmeter/results.csv
          retention-days: 7

  fe-e2e-tests:
    name: "FE: End-to-End Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright-e2e
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright-e2e.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.cache-playwright-e2e.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Build backend
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Wait for Kafka readiness
        run: |
          echo "Waiting for Kafka to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 9092 2>/dev/null; then
              echo "Kafka port is open, waiting for broker to stabilize..."
              sleep 5
              echo "Kafka is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
          ANTHROPIC_API_KEY: test-key
          SPRING_PROFILES_ACTIVE: mock-claude
        run: |
          java -Dspring.profiles.active=mock-claude -jar build/libs/*.jar &
          sleep 15

      - name: Verify backend is running
        run: |
          echo "Checking backend health..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/api/words?page=0\&size=1 > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 3
          done
          curl -sf http://localhost:3001/api/words?page=0\&size=1 || (echo "ERROR: Backend not responding" && exit 1)

      - name: Build and serve frontend
        working-directory: frontend
        run: |
          npm run build
          node e2e-server.cjs &
          sleep 3

      - name: Verify frontend is serving
        run: |
          curl -sf http://localhost:3000 > /dev/null || (echo "ERROR: Frontend not responding" && exit 1)
          echo "Frontend is serving"
          curl -sf http://localhost:3000/api/words?page=1\&limit=1 > /dev/null || (echo "ERROR: API proxy not working" && exit 1)
          echo "API proxy is working"

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3001
        run: npx playwright test --project=e2e

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fe-e2e-report
          path: frontend/playwright-report/
          retention-days: 7
