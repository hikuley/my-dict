name: Deploy to Dev

on:
  push:
    branches: [main]

jobs:
  tests:
    name: "Run All Tests"
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy-to-dev:
    name: "Deploy to Dev EC2"
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create deploy package
        run: |
          tar czf /tmp/my-dict-deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='infra' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.gradle' \
            --exclude='backend/build' \
            docker-compose.dev.yml \
            frontend/ \
            backend/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_DEV_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_DEV_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload and deploy
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/my-dict-deploy.tar.gz \
            ec2-user@${{ secrets.EC2_DEV_HOST }}:/tmp/my-dict-deploy.tar.gz

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_DEV_HOST }} 'bash -s' << 'DEPLOY_SCRIPT'
          set -euo pipefail
          cd /opt/my-dict
          tar xzf /tmp/my-dict-deploy.tar.gz
          rm -f /tmp/my-dict-deploy.tar.gz

          # Fetch secrets from AWS Secrets Manager
          echo "Fetching secrets from AWS Secrets Manager..."
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --region eu-west-1 \
            --secret-id my-dict/dev/secrets \
            --query SecretString \
            --output text)

          ANTHROPIC_API_KEY=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['ANTHROPIC_API_KEY'])")
          GOOGLE_CLIENT_ID=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['GOOGLE_CLIENT_ID'])")
          MAIL_USERNAME=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['MAIL_USERNAME'])")
          MAIL_PASSWORD=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['MAIL_PASSWORD'])")

          cat > /opt/my-dict/.env << ENV_END
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          MAIL_HOST=smtp.gmail.com
          MAIL_PORT=587
          MAIL_USERNAME=$MAIL_USERNAME
          MAIL_PASSWORD=$MAIL_PASSWORD
          MAIL_SMTP_AUTH=true
          MAIL_SMTP_STARTTLS=true
          AWS_REGION=eu-west-1
          CLOUDWATCH_LOG_GROUP=/my-dict-dev
          FRONTEND_URL=http://dev.kuleysoft.com
          ENV_END
          # Remove leading whitespace from .env
          sed -i 's/^[[:space:]]*//' /opt/my-dict/.env
          chmod 600 /opt/my-dict/.env

          docker compose -f docker-compose.dev.yml down
          docker compose -f docker-compose.dev.yml up -d --build --force-recreate
          echo "Waiting for services..."
          sleep 15
          docker compose -f docker-compose.dev.yml ps
          DEPLOY_SCRIPT
