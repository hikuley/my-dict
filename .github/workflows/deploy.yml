name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  be-unit-tests:
    name: "BE: Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests
        working-directory: backend
        run: ./gradlew unitTest --no-daemon

  be-integration-tests:
    name: "BE: Integration Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
        run: ./gradlew integrationTest --no-daemon

  fe-security-tests:
    name: "FE: Playwright Security Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build backend
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Wait for Kafka readiness
        run: |
          echo "Waiting for Kafka to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 9092 2>/dev/null; then
              echo "Kafka port is open, waiting for broker to stabilize..."
              sleep 5
              echo "Kafka is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
          ANTHROPIC_API_KEY: test-key
        run: |
          java -jar build/libs/*.jar &
          sleep 15

      - name: Verify backend is running
        run: |
          echo "Checking backend health..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/api/words?page=0\&size=1 > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 3
          done
          curl -sf http://localhost:3001/api/words?page=0\&size=1 || (echo "ERROR: Backend not responding" && exit 1)

      - name: Build and serve frontend
        working-directory: frontend
        run: |
          npm run build
          npx serve -s dist -l 3000 &
          sleep 3

      - name: Verify frontend is serving
        run: |
          curl -sf http://localhost:3000 > /dev/null || (echo "ERROR: Frontend not responding" && exit 1)
          echo "Frontend is serving"

      - name: Run Playwright security tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3001
        run: npx playwright test --project=security

  be-performance-tests:
    name: "BE: Performance / Load Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install JMeter
        run: |
          JMETER_VERSION=5.6.3
          wget -q "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz" -O /tmp/jmeter.tgz
          tar xzf /tmp/jmeter.tgz -C /opt
          echo "/opt/apache-jmeter-${JMETER_VERSION}/bin" >> $GITHUB_PATH

      - name: Build backend
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Wait for Kafka readiness
        run: |
          echo "Waiting for Kafka to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 9092 2>/dev/null; then
              echo "Kafka port is open, waiting for broker to stabilize..."
              sleep 5
              echo "Kafka is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
          ANTHROPIC_API_KEY: test-key
        run: |
          java -jar build/libs/*.jar &
          sleep 15

      - name: Verify backend is running
        run: |
          echo "Checking backend health..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 3
          done
          curl -sf http://localhost:3001/api/health || (echo "ERROR: Backend not responding" && exit 1)

      - name: Run JMeter load test
        working-directory: backend/src/test/jmeter
        run: |
          jmeter -n \
            -t load-test.jmx \
            -l results.csv \
            -e -o report/ \
            -Jhost=localhost \
            -Jport=3001 \
            -Jthreads=100 \
            -Jrampup=30 \
            -Jduration=120

      - name: Check performance thresholds
        working-directory: backend/src/test/jmeter
        run: bash check-results.sh results.csv 5.0 5000

  deploy:
    needs: [be-unit-tests, be-integration-tests, fe-security-tests, be-performance-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create deploy package
        run: |
          tar czf /tmp/my-dict-deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='infra' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.gradle' \
            --exclude='backend/build' \
            docker-compose.yml \
            docker.sh \
            frontend/ \
            backend/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload and deploy
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/my-dict-deploy.tar.gz \
            ec2-user@${{ secrets.EC2_HOST }}:/tmp/my-dict-deploy.tar.gz

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            cd /opt/my-dict
            tar xzf /tmp/my-dict-deploy.tar.gz
            rm -f /tmp/my-dict-deploy.tar.gz
            docker compose down
            docker compose up -d --build --force-recreate
            echo "Waiting for services..."
            sleep 15
            docker compose ps
          EOF
