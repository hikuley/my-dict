name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  be-unit-integration-tests:
    name: "BE: Unit & Integration Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be-test-results
          path: backend/build/reports/tests/
          retention-days: 7

  fe-security-tests:
    name: "FE: Playwright Security Tests"
    runs-on: ubuntu-latest
    needs: be-unit-integration-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydict
          POSTGRES_USER: mydict
          POSTGRES_PASSWORD: mydict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build backend
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mydict
          DB_USER: mydict
          DB_PASSWORD: mydict
          KAFKA_BROKER: localhost:9092
          ANTHROPIC_API_KEY: test-key
        run: |
          java -jar build/libs/*.jar &
          sleep 10

      - name: Build and serve frontend
        working-directory: frontend
        run: |
          npm run build
          npx serve -s dist -l 3000 &
          sleep 3

      - name: Run Playwright security tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test --project=security

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fe-playwright-report
          path: frontend/playwright-report/
          retention-days: 7
