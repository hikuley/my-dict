name: Deploy to Prod

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tests:
    name: "Run All Tests"
    uses: ./.github/workflows/test.yml
    secrets: inherit

  version-and-release:
    name: "Create Version & Release"
    needs: [tests]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: version
        run: |
          DATE=$(date +%Y.%m.%d)
          LATEST=$(git tag -l "v${DATE}.*" | sort -t. -k4 -n | tail -1)
          if [ -z "$LATEST" ]; then
            VERSION="v${DATE}.1"
          else
            SUFFIX=$(echo "$LATEST" | awk -F. '{print $NF}')
            VERSION="v${DATE}.$((SUFFIX + 1))"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $VERSION"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="- No changes since last release"
          fi
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "${{ steps.notes.outputs.release_notes }}"

  deploy-to-prod:
    name: "Deploy to Prod EC2"
    needs: [version-and-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create deploy package
        run: |
          tar czf /tmp/my-dict-deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='infra' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.gradle' \
            --exclude='backend/build' \
            docker-compose.prod.yml \
            frontend/ \
            backend/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload and deploy
        run: |
          VERSION="${{ needs.version-and-release.outputs.version }}"

          scp -i ~/.ssh/deploy_key \
            /tmp/my-dict-deploy.tar.gz \
            ec2-user@${{ secrets.EC2_PROD_HOST }}:/tmp/my-dict-deploy.tar.gz

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_PROD_HOST }} "DEPLOY_VERSION=$VERSION bash -s" << 'OUTER_EOF'
            cd /opt/my-dict
            tar xzf /tmp/my-dict-deploy.tar.gz
            rm -f /tmp/my-dict-deploy.tar.gz
            echo "$DEPLOY_VERSION" > VERSION

            # Fetch secrets from AWS Secrets Manager
            echo "Fetching secrets from AWS Secrets Manager..."
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --region eu-west-1 \
              --secret-id my-dict/prod/secrets \
              --query SecretString \
              --output text)

            ANTHROPIC_API_KEY=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['ANTHROPIC_API_KEY'])")
            GOOGLE_CLIENT_ID=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['GOOGLE_CLIENT_ID'])")
            MAIL_USERNAME=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['MAIL_USERNAME'])")
            MAIL_PASSWORD=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['MAIL_PASSWORD'])")

            cat > /opt/my-dict/.env <<ENVEOF
ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
MAIL_USERNAME=$MAIL_USERNAME
MAIL_PASSWORD=$MAIL_PASSWORD
MAIL_SMTP_AUTH=true
MAIL_SMTP_STARTTLS=true
AWS_REGION=eu-west-1
CLOUDWATCH_LOG_GROUP=/my-dict-prod
ENVEOF
            chmod 600 /opt/my-dict/.env

            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate
            echo "Waiting for services..."
            sleep 15
            docker compose -f docker-compose.prod.yml ps
            echo "Deployed version: $DEPLOY_VERSION"
          OUTER_EOF
